name: NepTrainKit Unit Tests

on:
  push:
    branches: [ master]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
        pip install -e .

    - name: Run tests with pytest
      run: |
        pytest tests/  --cov=./src/NepTrainKit  --junitxml=junit.xml -o junit_family=legacy

    - name: Install docs dependencies
      run: |
        pip install -r docs/requirements.txt

    - name: Audit Make Dataset card docs
      run: |
        python tools/docs/audit_card_docs.py

    - name: Build docs (warnings as errors)
      run: |
        python -m sphinx -W -b html docs/source docs/build/html

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v5
      if: success()
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
    - name: Upload test results to Codecov
      if: ${{ !cancelled() }}
      uses: codecov/test-results-action@v1
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
